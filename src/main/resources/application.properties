spring.application.name=backend
server.port=${PORT:8080}

# H2 In-Memory Database Configuration
spring.datasource.url=${DB_URL:jdbc:h2:mem:smartclassdb}
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# JWT Secret and Expiration (1 day)
smartclass.app.jwtSecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
smartclass.app.jwtExpirationMs=86400000
