spring.application.name=backend
server.port=${PORT:8080}

# Database Configuration (H2)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect


# Security and JWT
# Note: Use a long, secure string for SMARTCLASS_JWT_SECRET in production.
smartclass.app.jwtSecret=${JWT_SECRET:======================SmartClassProjectSecretKeyByShravan=========================}
smartclass.app.jwtExpirationMs=86400000

# CORS Configuration
# Note: Set ALLOWED_ORIGIN to your frontend URL in Render.
smartclass.app.allowedOrigin=${ALLOWED_ORIGIN:*}
