spring.application.name=backend
server.port=8081

# H2 In-Memory Database Configuration
spring.datasource.url=jdbc:h2:mem:smartclassdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret and Expiration (1 day)
smartclass.app.jwtSecret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
smartclass.app.jwtExpirationMs=86400000
